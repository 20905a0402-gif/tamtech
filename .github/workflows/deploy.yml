name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Cloudflare API token
        id: cf_token
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_API_TOKEN" ]; then
            echo "token_source=CF_API_TOKEN" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$CF_API_TOKEN"
            echo "CLOUDFLARE_API_TOKEN=$CF_API_TOKEN" >> "$GITHUB_ENV"
          elif [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "token_source=CLOUDFLARE_API_TOKEN" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$CLOUDFLARE_API_TOKEN"
            echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> "$GITHUB_ENV"
          else
            echo "::error::Add GitHub secret CF_API_TOKEN (or CLOUDFLARE_API_TOKEN)"
            exit 1
          fi

      - name: Verify Cloudflare credentials
        run: npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e37305ece12d903f974d9a0d48a44f20

      - name: Build for Cloudflare (OpenNext)
        run: npm run build:opennext
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Verify OpenNext build output
        run: |
          test -f .open-next/worker.js || (echo "::error::Missing .open-next/worker.js — build failed" && exit 1)
          test -f .open-next/.build/open-next.config.edge.mjs || (echo "::error::Missing compiled OpenNext config" && exit 1)
          echo "OpenNext build artifacts OK"

      - name: Deploy to Cloudflare Workers
        run: |
          set -o pipefail
          npx opennextjs-cloudflare deploy || {
            echo "::group::Wrangler error logs"
            ls -la /home/runner/.config/.wrangler/logs/ 2>/dev/null || true
            cat /home/runner/.config/.wrangler/logs/*.log 2>/dev/null || true
            echo "::endgroup::"
            exit 1
          }
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e37305ece12d903f974d9a0d48a44f20
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
