name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -z "${{ secrets.CF_API_TOKEN }}" ]; then
            echo "::error::Add GitHub secret CLOUDFLARE_API_TOKEN (API token scoped to account 627e869acb907ab3d1f0df37d64c9b65)"
            missing=1
          fi
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "::error::Add GitHub secret NEXT_PUBLIC_SUPABASE_URL"
            missing=1
          fi
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Add GitHub secret NEXT_PUBLIC_SUPABASE_ANON_KEY"
            missing=1
          fi
          exit $missing

      - name: Resolve Cloudflare API token
        id: cf_token
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_API_TOKEN" ]; then
            echo "::add-mask::$CF_API_TOKEN"
            echo "CLOUDFLARE_API_TOKEN=$CF_API_TOKEN" >> "$GITHUB_ENV"
          else
            echo "::add-mask::$CLOUDFLARE_API_TOKEN"
            echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Verify Cloudflare credentials
        run: |
          npx wrangler whoami
          echo "Expected account: Pivotsc321@gmail.com (627e869acb907ab3d1f0df37d64c9b65)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 627e869acb907ab3d1f0df37d64c9b65

      - name: Build for Cloudflare (OpenNext)
        run: npm run build:opennext
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Verify OpenNext build output
        run: |
          test -f .open-next/worker.js || (echo "::error::Missing .open-next/worker.js — build failed" && exit 1)
          test -f .open-next/.build/open-next.config.edge.mjs || (echo "::error::Missing compiled OpenNext config" && exit 1)
          echo "OpenNext build artifacts OK"

      - name: Deploy to Cloudflare Workers
        run: |
          set -o pipefail
          npx opennextjs-cloudflare deploy || {
            echo "::group::Wrangler error logs"
            ls -la /home/runner/.config/.wrangler/logs/ 2>/dev/null || true
            cat /home/runner/.config/.wrangler/logs/*.log 2>/dev/null || true
            echo "::endgroup::"
            exit 1
          }
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 627e869acb907ab3d1f0df37d64c9b65
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
